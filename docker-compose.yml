# docker-compose.yml

services:
  # ─────────────────────────────────────────────────────────────
  # Backend: Flask API Service
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: campaign-analyzer-backend
    restart: unless-stopped

    # Environment variables from .env file
    env_file:
      - .env

    # Environment variables for container operation
    environment:
      - FLASK_ENV=production
      - FLASK_APP=backend.app
      - PYTHONUNBUFFERED=1

    # Expose to internal network only (not published to host)
    expose:
      - "5000"

    # Volume mounts for data persistence
    volumes:
      - ./data:/data:ro
      - backend-temp:/tmp/campaign_analysis

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    networks:
      - campaign-network

  # ─────────────────────────────────────────────────────────────
  # Frontend: Nginx Static File Server
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: campaign-analyzer-frontend
    restart: unless-stopped

    # Port mapping (published to host)
    ports:
      - "8081:81"

    # Depend on backend service healthy status
    depends_on:
      backend:
        condition: service_healthy

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    networks:
      - campaign-network

# ─────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────
networks:
  campaign-network:
    driver: bridge
    name: campaign-network

# ─────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────
volumes:
  backend-temp:
    name: campaign-analyzer-temp
